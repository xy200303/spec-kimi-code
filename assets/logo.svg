<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Spec Kimi logo</title>
  <desc id="desc">A developer terminal prompt inside an engineering frame.</desc>
  <defs>
    <linearGradient id="background" x1="31" y1="21" x2="222" y2="235" gradientUnits="userSpaceOnUse">
      <stop stop-color="#312E81"/>
      <stop offset="1" stop-color="#0B1026"/>
    </linearGradient>
    <linearGradient id="frame" x1="63" y1="56" x2="196" y2="203" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
